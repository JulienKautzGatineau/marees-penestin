<title>Marée Pénestin</title>
<style>
  :root {
    --sand-1: #f6e4c4;
    --sand-2: #e8c896;
    --sand-3: #c79968;
    --sea-deep: #103e5b;
    --sea-mid:  #2c7396;
    --sea-light:#5aa3c5;
    --sea-foam: #d8edf5;
    --sky-1: #c8e6f3;
    --sky-2: #f4dfba;
    --text: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #061d2f;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* SKY */
  .sky {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 80% 25%, rgba(255,255,255,0.45) 0, transparent 14%),
      radial-gradient(ellipse at 25% 35%, rgba(255,255,255,0.35) 0, transparent 12%),
      radial-gradient(ellipse at 55% 18%, rgba(255,255,255,0.28) 0, transparent 10%),
      linear-gradient(to bottom, var(--sky-1) 0%, #e1edd8 55%, var(--sky-2) 90%, var(--sand-1) 100%);
    z-index: 0;
  }

  /* CLIFF */
  .cliff-svg {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 26vh;
    min-height: 180px;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
  }

  /* SAND */
  .sand {
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 12% 78%, rgba(255,255,255,0.4) 0, transparent 3px),
      radial-gradient(circle at 27% 92%, rgba(80,40,20,0.35) 0, transparent 4px),
      radial-gradient(circle at 38% 84%, rgba(255,255,255,0.3) 0, transparent 2px),
      radial-gradient(circle at 49% 95%, rgba(80,40,20,0.25) 0, transparent 3px),
      radial-gradient(circle at 62% 88%, rgba(255,255,255,0.35) 0, transparent 4px),
      radial-gradient(circle at 73% 82%, rgba(80,40,20,0.3) 0, transparent 3px),
      radial-gradient(circle at 84% 94%, rgba(255,255,255,0.3) 0, transparent 3px),
      radial-gradient(circle at 92% 86%, rgba(80,40,20,0.25) 0, transparent 4px),
      radial-gradient(circle at 6% 96%, rgba(80,40,20,0.28) 0, transparent 3px),
      radial-gradient(circle at 55% 78%, rgba(255,255,255,0.25) 0, transparent 2px),
      radial-gradient(circle at 18% 65%, rgba(80,40,20,0.2) 0, transparent 3px),
      radial-gradient(circle at 88% 70%, rgba(255,255,255,0.25) 0, transparent 2px),
      radial-gradient(circle at 35% 60%, rgba(80,40,20,0.18) 0, transparent 3px),
      radial-gradient(ellipse 60% 30% at 50% 40%, rgba(255,255,255,0.08), transparent 70%),
      linear-gradient(to bottom,
        var(--sand-1) 0%,
        var(--sand-2) 55%,
        var(--sand-3) 100%);
    z-index: 1;
  }

  .wet-sand {
    position: fixed; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(to bottom,
      rgba(80, 40, 20, 0.0) 0%,
      rgba(80, 40, 20, 0.3) 50%,
      rgba(80, 40, 20, 0.55) 100%);
    z-index: 2;
    transition: bottom 1.6s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }

  #sea-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  /* CENTER */
  .center {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    text-align: center;
    z-index: 10;
    color: var(--text);
    text-shadow: 0 2px 14px rgba(0,0,0,0.55), 0 0 24px rgba(0,0,0,0.3);
    user-select: none;
  }
  .city {
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.92;
    margin-bottom: 6px;
    font-weight: 300;
  }
  .temp-air {
    font-size: clamp(64px, 16vw, 140px);
    font-weight: 200;
    line-height: 1;
    letter-spacing: -3px;
  }
  .temp-air span.unit {
    font-size: 0.4em;
    vertical-align: top;
    margin-left: 4px;
    font-weight: 300;
  }
  .temp-water {
    margin-top: 10px;
    font-size: clamp(16px, 3.6vw, 22px);
    font-weight: 300;
    opacity: 0.95;
  }
  .temp-water .icon { margin-right: 6px; }

  /* TOP BAR */
  .topbar {
    position: fixed;
    top: calc(26vh + 10px);
    left: 0; right: 0;
    padding: 0 22px;
    z-index: 11;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    color: var(--text);
    text-shadow: 0 1px 8px rgba(0,0,0,0.5), 0 0 14px rgba(0,0,0,0.35);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .topbar .col { line-height: 1.5; }
  .topbar .col.right { text-align: right; }
  .topbar .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.78;
    margin-bottom: 2px;
  }
  .topbar .val { font-size: 18px; font-weight: 300; }

  /* BOTTOM PANEL — combines time slider + tides + sun */
  .bottom-panel {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    padding: 14px 18px max(14px, env(safe-area-inset-bottom, 14px));
    z-index: 12;
    color: var(--text);
    text-shadow: 0 1px 10px rgba(0,0,0,0.85), 0 0 18px rgba(0,0,0,0.5);
    background: transparent;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .time-display { display: flex; align-items: baseline; gap: 10px; }
  .sel-day {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.85;
  }
  .sel-hour {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .now-btn {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-shadow: none;
    transition: opacity .2s;
    font-family: inherit;
  }
  .now-btn:active { transform: scale(0.96); }
  .now-btn.dim { opacity: 0.45; }

  /* Range slider */
  .slider-wrap {
    position: relative;
    margin: 6px 0 4px;
  }
  input[type="range"]#time-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    margin: 0;
    padding: 0;
    height: 26px;
  }
  input[type="range"]#time-slider::-webkit-slider-runnable-track {
    height: 4px;
    background: linear-gradient(to right,
      rgba(255,255,255,0.6) 0%,
      rgba(255,255,255,0.6) var(--pct, 0%),
      rgba(255,255,255,0.25) var(--pct, 0%),
      rgba(255,255,255,0.25) 100%);
    border-radius: 2px;
    border: none;
  }
  input[type="range"]#time-slider::-moz-range-track {
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    border: none;
  }
  input[type="range"]#time-slider::-moz-range-progress {
    height: 4px;
    background: rgba(255,255,255,0.65);
    border-radius: 2px;
  }
  input[type="range"]#time-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    height: 20px;
    width: 20px;
    border-radius: 50%;
    background: white;
    border: none;
    margin-top: -8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45), 0 0 0 3px rgba(255,255,255,0.18);
    cursor: grab;
  }
  input[type="range"]#time-slider::-moz-range-thumb {
    height: 20px;
    width: 20px;
    border-radius: 50%;
    background: white;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45), 0 0 0 3px rgba(255,255,255,0.18);
    cursor: grab;
  }

  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-top: 2px;
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
  }
  .day-labels span {
    text-align: center;
    position: relative;
    padding-top: 4px;
  }
  .day-labels span::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    width: 1px; height: 3px;
    background: rgba(255,255,255,0.35);
  }
  .day-labels span:first-child { text-align: left; }
  .day-labels span:first-child::before { left: 0; }
  .day-labels span:last-child { text-align: right; }
  .day-labels span:last-child::before { left: auto; right: 0; }

  /* Info row (tides + sun) */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 10px;
    gap: 10px;
  }
  .tides { display: flex; gap: 12px; flex-wrap: wrap; }
  .tide-item .type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.85;
  }
  .tide-item .time {
    font-size: 16px;
    font-weight: 300;
    margin-top: 1px;
  }
  .tide-item .height {
    font-size: 10px;
    opacity: 0.78;
  }
  .sun {
    text-align: right;
    line-height: 1.45;
    font-size: 12px;
    opacity: 0.95;
    white-space: nowrap;
  }
  .sun .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.78;
  }
  .sun .val { font-size: 14px; font-weight: 300; }

  .loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    background: rgba(16, 62, 91, 0.92);
    color: white; font-weight: 300;
    letter-spacing: 1px;
    transition: opacity .5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }

  .error {
    position: fixed;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 8px 14px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
    z-index: 100;
    display: none;
  }

  .refresh {
    position: fixed;
    top: max(14px, env(safe-area-inset-top, 14px));
    right: 16px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 10px;
    border-radius: 18px;
    font-size: 13px;
    cursor: pointer;
    z-index: 13;
    text-shadow: none;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .refresh:active { transform: scale(0.96); }

  /* ============================================================
     RESPONSIVE — phones (portrait)
     ============================================================ */
  @media (max-width: 480px) {
    .cliff-svg { height: 22vh; min-height: 150px; }
    .topbar { top: calc(22vh + 8px); padding: 0 14px; }
    .topbar .val { font-size: 16px; }
    .topbar .label { font-size: 9px; letter-spacing: 1.2px; }
    .city { font-size: 11px; letter-spacing: 4px; }
    .temp-air { font-size: clamp(56px, 17vw, 110px); }
    .temp-water { font-size: 13px; margin-top: 6px; }
    .center { transform: translate(-50%, -60%); }
    .bottom-panel { padding: 10px 14px max(10px, env(safe-area-inset-bottom, 10px)); }
    .sel-hour { font-size: 18px; }
    .sel-day { font-size: 10px; letter-spacing: 1.5px; }
    .now-btn { padding: 4px 10px; font-size: 9px; }
    .day-labels { font-size: 8.5px; }
    .info-row { margin-top: 6px; }
    .tide-item .time { font-size: 14px; }
    .tide-item .height { font-size: 9px; }
    .tide-item .type { font-size: 8px; letter-spacing: 1.2px; }
    .tides { gap: 7px; }
    .sun .val { font-size: 12px; }
    .sun .label { font-size: 8px; }
    .wet-sand { height: 32px; }
    .refresh { width: 30px; height: 30px; padding: 4px; font-size: 12px; }
  }

  /* Very small / short phones (iPhone SE, mini) */
  @media (max-width: 380px), (max-height: 700px) and (max-width: 480px) {
    .cliff-svg { height: 19vh; min-height: 130px; }
    .topbar { top: calc(19vh + 6px); }
    .temp-air { font-size: clamp(50px, 16vw, 90px); }
    .city { font-size: 10px; letter-spacing: 3px; }
    .tides { gap: 5px; }
  }

  /* Landscape on phones — keep cliff small, prioritize the wave area */
  @media (max-height: 500px) and (orientation: landscape) {
    .cliff-svg { height: 25vh; min-height: 80px; }
    .topbar { top: calc(25vh + 4px); }
    .center { transform: translate(-50%, -50%); }
    .temp-air { font-size: clamp(40px, 9vw, 80px); }
    .bottom-panel { padding: 6px 14px max(6px, env(safe-area-inset-bottom, 6px)); }
    .info-row { margin-top: 4px; }
  }
</style>
</head>

  <div class="topbar">

<script>
  // Pénestin (Morbihan, 56)
  const LAT = 47.4833;
  const LON = -2.4833;
  const TZ  = "Europe/Paris";
  const FORECAST_DAYS = 7;

  const $ = (id) => document.getElementById(id);

  function fmtTime(date) {
    return date.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", timeZone: TZ });
  }
  function parseLocal(s) { return new Date(s); }
  function ymdLocal(d) {
    return d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0");
  }
  function showError(msg) {
    const el = $("error");
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 6000);
  }

  // ===========================================================
  //  STATE
  // ===========================================================
  let hourlyWeather = null;   // { time[], temperature_2m[] }
  let hourlyMarine  = null;   // { time[], sea_level_height_msl[], sea_surface_temperature[] }
  let dailyWeather  = null;   // { time[], sunrise[], sunset[] }
  let allExtrema    = [];
  let nowIndex      = 0;
  let selectedIndex = 0;
  let userScrubbing = false;

  // ===========================================================
  //  CANVAS — water + waves
  // ===========================================================
  const canvas = $("sea-canvas");
  const ctx = canvas.getContext("2d");

  let cssW = 0, cssH = 0;
  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cssW = window.innerWidth;
    cssH = window.innerHeight;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let seaRatio = 0.5, seaRatioTarget = 0.5;
  function baselineY() {
    const seaPct = 0.12 + seaRatio * 0.66;
    return cssH - cssH * seaPct;
  }

  // Photorealistic ocean: stacked sine swells (no visible periodicity)
  // Long rolling swells + medium chop + short ripples
  const SWELLS = [
    { freq: 0.0030, speed: 0.00026, phase: 0,    amp: 22 },
    { freq: 0.0058, speed: 0.00041, phase: 1.3,  amp: 14 },
    { freq: 0.0094, speed: 0.00058, phase: 2.5,  amp: 8 },
    { freq: 0.0162, speed: 0.00082, phase: 3.7,  amp: 4.5 },
    { freq: 0.0271, speed: 0.00115, phase: 0.6,  amp: 2.5 },
    { freq: 0.0468, speed: 0.00152, phase: 4.2,  amp: 1.4 },
  ];
  function surfaceY(x, t) {
    let y = 0;
    for (const s of SWELLS) y += Math.sin(x * s.freq + t * s.speed + s.phase) * s.amp;
    return y;
  }

  function drawSea(t) {
    ctx.clearRect(0, 0, cssW, cssH);
    const base = baselineY();
    const step = 3;

    // 1. Build the surface point array
    const N = Math.ceil(cssW / step) + 1;
    const ys = new Array(N);
    for (let i = 0; i < N; i++) ys[i] = base + surfaceY(i * step, t);

    // 2. Sea body — single fill with vertical depth gradient
    const grad = ctx.createLinearGradient(0, base - 60, 0, cssH);
    grad.addColorStop(0.00, "#7fb6d0");   // sun-lit surface
    grad.addColorStop(0.08, "#4d8eb0");
    grad.addColorStop(0.30, "#1f5f86");
    grad.addColorStop(0.65, "#103e5b");
    grad.addColorStop(1.00, "#061d2f");   // deep ocean

    ctx.beginPath();
    ctx.moveTo(0, cssH);
    ctx.lineTo(0, ys[0]);
    for (let i = 1; i < N; i++) ctx.lineTo(i * step, ys[i]);
    ctx.lineTo(cssW, cssH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // 3. Clip to sea body for the surface effects
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, cssH);
    ctx.lineTo(0, ys[0]);
    for (let i = 1; i < N; i++) ctx.lineTo(i * step, ys[i]);
    ctx.lineTo(cssW, cssH);
    ctx.closePath();
    ctx.clip();

    // 4. Sun-glint streaks (long horizontal soft bands, slowly drifting)
    for (let band = 0; band < 7; band++) {
      const yOff = 18 + band * 22 + Math.sin(t * 0.0003 + band * 0.9) * 5;
      const opacity = 0.05 + (6 - band) * 0.011;
      const lg = ctx.createLinearGradient(0, 0, cssW, 0);
      const drift = (t * 0.00004 + band * 0.13) % 1;
      lg.addColorStop(Math.max(0, drift - 0.25), "rgba(255,255,255,0)");
      lg.addColorStop(drift, `rgba(255,255,255,${opacity * 1.6})`);
      lg.addColorStop(Math.min(1, drift + 0.25), "rgba(255,255,255,0)");
      ctx.fillStyle = lg;
      ctx.fillRect(0, base + yOff, cssW, 2);
    }

    // 5. Wave-flank highlights — brighten the down-slope side of each crest
    //    (where light reflects). This adds dimension without flicker.
    for (let i = 1; i < N - 1; i++) {
      const slope = ys[i+1] - ys[i-1]; // positive = going down (after a crest)
      if (slope > 0.6) {
        const a = Math.min(0.18, slope * 0.022);
        ctx.fillStyle = `rgba(220,235,245,${a})`;
        ctx.fillRect(i * step, ys[i] + 0.5, step + 0.5, 5 + slope * 0.6);
      }
    }

    ctx.restore();

    // 6. Surface foam line (irregular, soft glow)
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const x = i * step;
      if (i === 0) ctx.moveTo(x, ys[i]);
      else ctx.lineTo(x, ys[i]);
    }
    ctx.lineWidth = 1.4;
    ctx.strokeStyle = "rgba(255,255,255,0.55)";
    ctx.shadowColor = "rgba(255,255,255,0.45)";
    ctx.shadowBlur = 5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 7. Foam patches at the actual local crests (peaks)
    //    Each peak gets a soft, irregular blob with deterministic offsets
    //    so it doesn't flicker but slowly drifts.
    for (let i = 2; i < N - 2; i++) {
      if (ys[i] < ys[i-1] && ys[i] < ys[i+1] && ys[i-1] < ys[i-2] && ys[i+1] < ys[i+2]) {
        const x = i * step;
        const y = ys[i];
        // Strength based on how prominent the peak is
        const prominence = ((ys[i-2] + ys[i+2]) / 2) - y;
        if (prominence < 1) continue;
        const baseR = 3 + Math.min(8, prominence * 0.6);
        for (let k = 0; k < 5; k++) {
          const dx = Math.sin(x * 0.05 + k * 1.7 + t * 0.0008) * (5 + k * 1.5);
          const dy = -1 + Math.cos(x * 0.07 + k * 2.1) * 1.2;
          const r = baseR * (0.5 + k * 0.18);
          const a = Math.max(0, 0.5 - k * 0.09) * Math.min(1, prominence / 6);
          ctx.fillStyle = `rgba(255,255,255,${a})`;
          ctx.beginPath();
          ctx.ellipse(x + dx, y + dy, r, r * 0.45, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
  function tick(now) {
    seaRatio += (seaRatioTarget - seaRatio) * (userScrubbing ? 0.18 : 0.04);
    drawSea(now);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  function setSeaLevel(ratio) {
    seaRatioTarget = Math.max(0, Math.min(1, ratio));
    const seaPct = 0.12 + seaRatioTarget * 0.66;
    $("wetsand").style.bottom = (seaPct * 100) + "%";
  }

  // ===========================================================
  //  TIDE / DATA HELPERS
  // ===========================================================
  function findExtrema(times, levels) {
    const out = [];
    for (let i = 1; i < levels.length - 1; i++) {
      const a = levels[i-1], b = levels[i], c = levels[i+1];
      if (a == null || b == null || c == null) continue;
      if (b > a && b > c) out.push({ time: parseLocal(times[i]), height: b, type: "high" });
      else if (b < a && b < c) out.push({ time: parseLocal(times[i]), height: b, type: "low" });
    }
    return out;
  }
  function approxCoef(highH, lowH) {
    const range = Math.max(0, highH - lowH);
    let c = Math.round(range * 19);
    if (c < 20) c = 20;
    if (c > 120) c = 120;
    return c;
  }
  function dayRatio(hourIdx) {
    const time = parseLocal(hourlyMarine.time[hourIdx]);
    const level = hourlyMarine.sea_level_height_msl[hourIdx];
    if (level == null) return 0.5;
    const dayStr = ymdLocal(time);
    let lo = Infinity, hi = -Infinity;
    for (let i = 0; i < hourlyMarine.time.length; i++) {
      if (ymdLocal(parseLocal(hourlyMarine.time[i])) === dayStr) {
        const v = hourlyMarine.sea_level_height_msl[i];
        if (v != null) {
          if (v < lo) lo = v;
          if (v > hi) hi = v;
        }
      }
    }
    if (!isFinite(lo) || !isFinite(hi) || hi === lo) return 0.5;
    return Math.max(0, Math.min(1, (level - lo) / (hi - lo)));
  }
  function findClosestIndex(times) {
    const now = Date.now();
    let best = 0, diff = Infinity;
    for (let i = 0; i < times.length; i++) {
      const d = Math.abs(parseLocal(times[i]).getTime() - now);
      if (d < diff) { diff = d; best = i; }
    }
    return best;
  }
  function dayIndexFor(date) {
    if (!dailyWeather) return -1;
    const target = ymdLocal(date);
    for (let i = 0; i < dailyWeather.time.length; i++) {
      if (dailyWeather.time[i].slice(0,10) === target) return i;
    }
    return -1;
  }
  function formatSelectedTime(date) {
    const today = new Date(); today.setHours(0,0,0,0);
    const sel = new Date(date); sel.setHours(0,0,0,0);
    const dayDiff = Math.round((sel - today) / 86400000);
    let dayLabel;
    if (dayDiff === 0) dayLabel = "Aujourd'hui";
    else if (dayDiff === 1) dayLabel = "Demain";
    else if (dayDiff === -1) dayLabel = "Hier";
    else {
      const dayName = date.toLocaleDateString("fr-FR", { weekday: "long" });
      dayLabel = dayName.charAt(0).toUpperCase() + dayName.slice(1);
    }
    return { day: dayLabel, hour: fmtTime(date) };
  }

  // ===========================================================
  //  RENDER (called whenever selectedIndex changes)
  // ===========================================================
  function render(idx) {
    if (!hourlyWeather || !hourlyMarine) return;
    idx = Math.max(0, Math.min(hourlyWeather.time.length - 1, idx));
    const time = parseLocal(hourlyWeather.time[idx]);

    // Air temp
    const airT = hourlyWeather.temperature_2m[idx];
    $("temp").textContent = (airT != null) ? Math.round(airT) : "--";

    // Water temp
    const waterT = hourlyMarine.sea_surface_temperature[idx];
    $("water").textContent = (waterT != null) ? waterT.toFixed(1) : "--";

    // Sea level visual
    setSeaLevel(dayRatio(idx));

    // Sun for that day
    const di = dayIndexFor(time);
    if (di >= 0) {
      $("sunrise").textContent = fmtTime(parseLocal(dailyWeather.sunrise[di]));
      $("sunset").textContent  = fmtTime(parseLocal(dailyWeather.sunset[di]));
    }

    // Tide list for that day
    const dayStr = ymdLocal(time);
    const dayExtrema = allExtrema.filter(e => ymdLocal(e.time) === dayStr);
    const tidesEl = $("tides");
    tidesEl.innerHTML = "";
    dayExtrema.slice(0, 4).forEach(e => {
      const div = document.createElement("div");
      div.className = "tide-item";
      div.innerHTML = `
        <div class="type">${e.type === "high" ? "▲ Pleine mer" : "▼ Basse mer"}</div>
        <div class="time">${fmtTime(e.time)}</div>
        <div class="height">${e.height.toFixed(2)} m</div>
      `;
      tidesEl.appendChild(div);
    });

    // Coef (per day)
    const dHighs = dayExtrema.filter(e => e.type === "high").map(e => e.height);
    const dLows  = dayExtrema.filter(e => e.type === "low").map(e => e.height);
    if (dHighs.length && dLows.length) {
      $("coef").textContent = approxCoef(Math.max(...dHighs), Math.min(...dLows)) + " ~";
    } else $("coef").textContent = "—";

    // Next tide after selected time
    const future = allExtrema.filter(e => e.time.getTime() > time.getTime());
    if (future.length) {
      const nx = future[0];
      $("next-label").textContent = nx.type === "high" ? "▲ Prochaine pleine mer" : "▼ Prochaine basse mer";
      $("next-tide").textContent = fmtTime(nx.time);
    } else {
      $("next-tide").textContent = "—";
    }

    // Time display
    const fmt = formatSelectedTime(time);
    $("sel-day").textContent = fmt.day;
    $("sel-hour").textContent = fmt.hour;

    // "Now" button state
    if (Math.abs(idx - nowIndex) <= 0) {
      $("now-btn").classList.add("dim");
    } else {
      $("now-btn").classList.remove("dim");
    }

    // Slider gradient progress (for Webkit track)
    const slider = $("time-slider");
    const max = parseInt(slider.max, 10) || 1;
    const pct = (idx / max) * 100;
    slider.style.setProperty("--pct", pct + "%");
  }

  function buildDayLabels() {
    if (!hourlyWeather) return;
    const startTime = parseLocal(hourlyWeather.time[0]);
    const labels = [];
    for (let d = 0; d < FORECAST_DAYS; d++) {
      const date = new Date(startTime);
      date.setDate(date.getDate() + d);
      let lbl;
      const today = new Date(); today.setHours(0,0,0,0);
      const dt = new Date(date); dt.setHours(0,0,0,0);
      const diff = Math.round((dt - today) / 86400000);
      if (diff === 0) lbl = "Auj";
      else if (diff === 1) lbl = "Dem";
      else lbl = date.toLocaleDateString("fr-FR", { weekday: "short" }).replace(".","");
      labels.push(lbl);
    }
    $("day-labels").innerHTML = labels.map(l => `<span>${l}</span>`).join("");
  }

  function goToNow() {
    selectedIndex = nowIndex;
    $("time-slider").value = nowIndex;
    render(nowIndex);
  }

  // Slider events
  const slider = $("time-slider");
  slider.addEventListener("input", (e) => {
    userScrubbing = true;
    selectedIndex = parseInt(e.target.value, 10);
    render(selectedIndex);
  });
  slider.addEventListener("change", () => { userScrubbing = false; });
  slider.addEventListener("pointerup", () => { userScrubbing = false; });
  slider.addEventListener("touchend", () => { userScrubbing = false; });

  // ===========================================================
  //  LOAD
  // ===========================================================
  async function loadAll() {
    $("loading").classList.remove("hidden");
    try {
      const marineUrl =
        `https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}` +
        `&hourly=sea_level_height_msl,sea_surface_temperature` +
        `&timezone=${encodeURIComponent(TZ)}&forecast_days=${FORECAST_DAYS}`;

      const weatherUrl =
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
        `&current=temperature_2m` +
        `&hourly=temperature_2m` +
        `&daily=sunrise,sunset` +
        `&timezone=${encodeURIComponent(TZ)}&forecast_days=${FORECAST_DAYS}`;

      const [marineRes, weatherRes] = await Promise.all([
        fetch(marineUrl), fetch(weatherUrl)
      ]);
      if (!marineRes.ok)  throw new Error("Marine API: "  + marineRes.status);
      if (!weatherRes.ok) throw new Error("Weather API: " + weatherRes.status);
      const marine = await marineRes.json();
      const weather = await weatherRes.json();

      hourlyMarine  = marine.hourly;
      hourlyWeather = weather.hourly;
      dailyWeather  = weather.daily;
      allExtrema    = findExtrema(hourlyMarine.time, hourlyMarine.sea_level_height_msl);

      // Slider range matches data length
      const maxIdx = hourlyWeather.time.length - 1;
      slider.max = maxIdx;

      nowIndex = findClosestIndex(hourlyWeather.time);
      // Only reset slider to "now" on first load (or if user hasn't moved it)
      if (selectedIndex === 0 || selectedIndex > maxIdx) {
        selectedIndex = nowIndex;
        slider.value = nowIndex;
      }

      buildDayLabels();
      render(selectedIndex);

      $("loading").classList.add("hidden");
    } catch (err) {
      console.error(err);
      showError("Erreur de chargement : " + err.message);
      $("loading").classList.add("hidden");
    }
  }

  loadAll();
  // Refresh every 5 minutes (keeps "now" up to date)
  setInterval(() => {
    const wasOnNow = (selectedIndex === nowIndex);
    loadAll().then(() => {
      if (wasOnNow) goToNow();
    });
  }, 5 * 60 * 1000);
</script>
</body>
</html>
